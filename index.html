<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Mother's Day | 4K Cinematic Letter with QR</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(ellipse at 30% 20%, #fff5ed, #ffe3d4);
            font-family: 'Cormorant Garamond', 'Noto Sans Khmer', 'Khmer OS', 'Moul', serif;
            overflow-x: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* Animated bokeh lights - optimized */
        .bokeh-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        .bokeh {
            position: absolute;
            background: radial-gradient(circle, rgba(255,220,180,0.4) 0%, rgba(255,190,140,0) 80%);
            border-radius: 50%;
            filter: blur(30px);
            animation: floatBokeh 16s infinite alternate ease-in-out;
        }
        @keyframes floatBokeh {
            0% { transform: translateY(0px) translateX(0px) scale(1); opacity: 0.3; }
            100% { transform: translateY(-50px) translateX(30px) scale(1.2); opacity: 0.6; }
        }

        /* Floating hearts & petals canvas */
        #floatingCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        /* Main container */
        .main-container {
            position: relative;
            z-index: 20;
            width: 100%;
            max-width: 1300px;
            margin: 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 90vh;
        }

        /* Glowing header */
        .hero-title {
            text-align: center;
            margin-bottom: 2rem;
            animation: softPulse 3s infinite alternate;
        }
        .hero-title h1 {
            font-size: clamp(2rem, 7vw, 4.5rem);
            font-weight: 500;
            background: linear-gradient(135deg, #e8aa95, #d9896e);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-shadow: 0 5px 20px rgba(226, 140, 100, 0.3);
            letter-spacing: 2px;
        }
        @keyframes softPulse {
            0% { text-shadow: 0 0 2px #ffd5c0, 0 0 8px rgba(255,200,170,0.2);}
            100% { text-shadow: 0 0 18px #ffcfb0, 0 0 25px rgba(245,170,130,0.4);}
        }

        /* ========== 4K REALISTIC ENVELOPE ========== */
        .envelope-stage {
            perspective: 1200px;
            margin: 20px auto;
            cursor: pointer;
        }
        .envelope {
            position: relative;
            width: 380px;
            height: 245px;
            transform-style: preserve-3d;
            transition: transform 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.2);
            animation: elegantFloat 3.5s infinite ease-in-out;
        }
        @keyframes elegantFloat {
            0% { transform: translateY(0px); filter: drop-shadow(0 12px 15px rgba(0,0,0,0.1));}
            50% { transform: translateY(-6px); filter: drop-shadow(0 22px 22px rgba(180,100,70,0.15));}
            100% { transform: translateY(0px); filter: drop-shadow(0 12px 15px rgba(0,0,0,0.1));}
        }
        .envelope:hover {
            transform: scale(1.01) translateY(-3px);
            filter: drop-shadow(0 25px 25px rgba(160, 80, 50, 0.2));
        }

        .env-base {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(145deg, #f9e9dd, #fde4d2);
            border-radius: 18px;
            box-shadow: inset 0 1px 5px rgba(255,252,240,0.9), inset 0 -2px 3px rgba(0,0,0,0.02), 0 15px 25px -8px rgba(0,0,0,0.15);
            z-index: 1;
            border: 1px solid rgba(230,190,155,0.6);
        }
        .env-base::before {
            content: "❤️";
            position: absolute;
            bottom: 15px;
            right: 20px;
            font-size: 20px;
            opacity: 0.35;
            color: #c98564;
            pointer-events: none;
        }

        .env-flap {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 62%;
            background: linear-gradient(125deg, #fff5ec, #ffefe2);
            clip-path: polygon(0% 0%, 100% 0%, 50% 72%);
            z-index: 3;
            border-radius: 18px 18px 0 0;
            transform-origin: top;
            transition: transform 0.65s cubic-bezier(0.23, 1, 0.32, 1);
            box-shadow: inset 0 1px 5px rgba(255,245,230,0.9);
            cursor: pointer;
            backface-visibility: hidden;
        }
        .env-base::after {
            content: "";
            position: absolute;
            bottom: 12px;
            left: 20px;
            right: 20px;
            height: 30px;
            background: radial-gradient(ellipse, rgba(0,0,0,0.06) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }

        .envelope.open .env-flap {
            transform: rotateX(180deg);
        }

        /* ========== 4K LETTER MODAL ========== */
        .letter-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.55);
            backdrop-filter: blur(10px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.45s cubic-bezier(0.2, 0.9, 0.4, 1.2);
        }
        .letter-modal.active {
            opacity: 1;
            visibility: visible;
        }
        
        /* The 4K Letter Card - Premium Design */
        .letter-card-4k {
            background: #fffef7;
            width: 90%;
            max-width: 650px;
            max-height: 85vh;
            border-radius: 32px;
            padding: 1.8rem 1.8rem 1.5rem;
            box-shadow: 0 45px 70px rgba(0,0,0,0.3), 0 0 0 1px rgba(230,200,170,0.5), inset 0 1px 0 rgba(255,255,245,0.9);
            transform: scale(0.92) translateY(25px);
            transition: transform 0.5s cubic-bezier(0.2, 0.9, 0.4, 1.2);
            overflow-y: auto;
            position: relative;
            font-family: 'Cormorant Garamond', 'Noto Sans Khmer', serif;
        }
        .letter-modal.active .letter-card-4k {
            transform: scale(1) translateY(0);
        }
        
        /* Paper texture */
        .letter-card-4k::before {
            content: "";
            position: absolute;
            top: 18px;
            left: 25px;
            right: 25px;
            height: 70px;
            background: repeating-linear-gradient(45deg, rgba(200,170,130,0.05) 0px, rgba(200,170,130,0.05) 3px, transparent 3px, transparent 12px);
            border-radius: 12px;
            pointer-events: none;
        }
        
        .letter-card-4k::-webkit-scrollbar {
            width: 4px;
        }
        .letter-card-4k::-webkit-scrollbar-track {
            background: #f0e0d4;
            border-radius: 10px;
        }
        .letter-card-4k::-webkit-scrollbar-thumb {
            background: #cfa98a;
            border-radius: 10px;
        }
        
        /* Wax seal */
        .wax-seal {
            position: absolute;
            top: -16px;
            left: 50%;
            transform: translateX(-50%);
            width: 52px;
            height: 52px;
            background: radial-gradient(circle, #d4452a, #a1321a);
            border-radius: 50%;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2), inset 0 1px 2px rgba(255,255,200,0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }
        .wax-seal::after {
            content: "❤️";
            font-size: 24px;
            color: #ffefcf;
            text-shadow: 0 1px 1px rgba(0,0,0,0.15);
        }
        
        /* Letter header */
        .letter-header {
            text-align: center;
            margin-top: 8px;
            margin-bottom: 18px;
        }
        .letter-header .greeting {
            font-size: 1.9rem;
            font-weight: 500;
            color: #b47c62;
            letter-spacing: 1.5px;
        }
        .letter-header .divider {
            width: 70px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #d4a58a, #d4a58a, transparent);
            margin: 10px auto;
        }
        
        /* Photo + QR Section */
        .photo-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin: 10px 0 15px;
            align-items: center;
        }
        .mother-photo {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            object-fit: cover;
            object-position: center;
            border: 3px solid #f0d5c2;
            box-shadow: 0 10px 25px rgba(0,0,0,0.12), 0 0 0 2px #fff, 0 0 0 5px #eccfba;
            animation: photoGlow 2.5s infinite alternate, photoFloat 3.5s ease-in-out infinite;
            transition: transform 0.3s ease;
        }
        /* QR Code Picture container */
        .qr-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            animation: fadeInUp 0.8s ease-out;
        }
        .qr-picture {
            width: 110px;
            height: 110px;
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.15);
            border: 2px solid #f0cfb8;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.3s ease;
            background: #fef8f0;
            cursor: pointer;
        }
        .qr-picture img {
            width: 95%;
            height: 95%;
            object-fit: contain;
            border-radius: 16px;
        }
        /* QR placeholder - user will replace image later */
        .qr-placeholder-text {
            font-size: 0.7rem;
            color: #b48462;
            margin-top: 6px;
            text-align: center;
            background: rgba(255,235,220,0.6);
            padding: 4px 8px;
            border-radius: 30px;
            font-style: italic;
        }
        .qr-picture:hover {
            transform: scale(1.02);
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        @keyframes photoGlow {
            0% { box-shadow: 0 10px 25px rgba(0,0,0,0.12), 0 0 0 2px #fff, 0 0 0 5px #eccfba; }
            100% { box-shadow: 0 15px 32px rgba(212, 100, 70, 0.2), 0 0 0 2px #fff, 0 0 0 8px #f1cfb8; }
        }
        @keyframes photoFloat {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-4px); }
            100% { transform: translateY(0px); }
        }
        
        /* Khmer message styling - animated typing area */
        .khmer-message-4k {
            font-size: 1.15rem;
            line-height: 1.75;
            text-align: center;
            white-space: pre-line;
            font-family: 'Noto Sans Khmer', 'Khmer OS', 'Cormorant Garamond', serif;
            color: #4a2c22;
            background: rgba(250,240,230,0.45);
            padding: 16px 14px;
            border-radius: 24px;
            margin: 12px 0;
            letter-spacing: 0.2px;
            font-weight: 500;
            min-height: 210px;
        }
        
        /* extra message after typing */
        .extra-message {
            text-align: center;
            font-size: 1rem;
            color: #b4553a;
            margin-top: 5px;
            font-weight: bold;
            background: rgba(255,240,225,0.6);
            padding: 8px 12px;
            border-radius: 40px;
            display: inline-block;
            width: auto;
            margin-left: auto;
            margin-right: auto;
        }
        
        .english-translation-4k {
            font-size: 0.85rem;
            font-style: italic;
            color: #b48a72;
            text-align: center;
            margin: 8px 0 16px;
            letter-spacing: 0.3px;
        }
        
        .signature-4k {
            text-align: center;
            margin-top: 18px;
            padding-top: 14px;
            border-top: 1px solid #efd5c2;
            font-size: 1rem;
            font-style: italic;
            color: #b27b62;
        }
        
        .close-letter-btn {
            display: block;
            margin: 20px auto 5px;
            background: rgba(210, 160, 130, 0.2);
            border: 1px solid #d4a58a;
            padding: 8px 26px;
            border-radius: 50px;
            font-size: 0.95rem;
            cursor: pointer;
            color: #9b6a50;
            font-family: 'Cormorant Garamond', serif;
            font-weight: 600;
            transition: all 0.25s;
        }
        .close-letter-btn:hover, .close-letter-btn:active {
            background: #d4a58a;
            color: white;
            transform: scale(1.02);
        }
        
        /* Sparkle effect */
        .sparkle-burst {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1001;
        }

        @media (max-width: 600px) {
            .envelope { width: 300px; height: 195px; }
            .letter-card-4k { padding: 1.3rem; width: 92%; }
            .khmer-message-4k { font-size: 0.95rem; padding: 12px; min-height: 190px; }
            .greeting { font-size: 1.4rem; }
            .wax-seal { width: 44px; height: 44px; top: -14px; }
            .mother-photo { width: 85px; height: 85px; }
            .qr-picture { width: 85px; height: 85px; }
            .photo-container { gap: 12px; }
        }
    </style>
</head>
<body>
<div class="bokeh-layer" id="bokehContainer"></div>
<canvas id="floatingCanvas"></canvas>

<div class="main-container">
    <div class="hero-title">
        <h1>Happy Mother’s Day 💖</h1>
    </div>
    <div class="envelope-stage">
        <div class="envelope" id="realEnvelope">
            <div class="env-base"></div>
            <div class="env-flap"></div>
        </div>
    </div>
    <div style="margin-top: 30px; font-size: 0.8rem; color: #c28b6e; text-align: center; background: rgba(255,240,230,0.55); padding: 6px 18px; border-radius: 60px; backdrop-filter: blur(4px);">✨ ចុចលើសំបុត្រនឹងម៉ាក់ ✨</div>
</div>

<!-- 4K LETTER MODAL with extended Khmer text + QR picture placeholder -->
<div class="letter-modal" id="letterModal">
    <div class="letter-card-4k">
        <div class="wax-seal"></div>
        <div class="letter-header">
            <div class="greeting">✧ To My Dearest Mother ✧</div>
            <div class="divider"></div>
        </div>
        
        <!-- Beautiful Photo Section + QR Code Picture (YOU CAN CHANGE QR IMAGE LATER) -->
        <div class="photo-container">
            <img id="motherPhotoImg" class="mother-photo" src="https://scontent.fpnh5-2.fna.fbcdn.net/v/t39.30808-6/430992042_1741608802995089_8208996835778500515_n.jpg?_nc_cat=109&ccb=1-7&_nc_sid=1d70fc&_nc_eui2=AeGl13nEOcl4GAu3TKcCbue2V9FWl1SZ2XdX0VaXVJnZd6jF4GgHnM1685ufLDSFztzQTehiuGHA5o2gzIHUoxq6&_nc_ohc=VzyFTTFOhvkQ7kNvwGsMYEm&_nc_oc=Adom7WNJH8OjVmAuBKb63rvzf6gDV6VbkEHoW-rNmdyo6ND6p3Q6KEqbq0-fO4AXyZ8&_nc_zt=23&_nc_ht=scontent.fpnh5-2.fna&_nc_gid=MdBchyaz5aV7Xm7wHWtqAg&_nc_ss=7b2a8&oh=00_Af5ZBQ4rscHgzxa-Dwlf-gO4geIcOBXvzaV5NMZ6Zwsd9Q&oe=6A065A06"/>
            <!-- QR Code Picture Area - YOU CAN REPLACE THE SRC LATER -->
           
        </div>
        
        <!-- Animated Khmer Message Area (typing effect) -->
        <div class="khmer-message-4k" id="khmerMessageModal"></div>
        
        <!-- Extra special message after typing completes: "ហើយ QR Code កូននៅដដែលម៉ាក់" + love note -->
        <div id="extraMessageContainer" style="text-align: center; margin-top: 8px;"></div>
        
        <div class="english-translation-4k" id="englishTranslation">"Happy Mother's Day ❤️ Thank you for always loving, caring, and sacrificing everything for me. I love you so much."</div>
         <div class="qr-container">
                <div class="qr-picture" id="qrPictureBox">
                    <img id="qrCodeImg" src="qr.jpg" alt="QR Code Placeholder - replace later">
                </div>
                <div class="qr-placeholder-text">⭐ កូនស្រឡាញ់ម៉ាក់ ⭐</div>
            </div>
        <div class="signature-4k" id="signatureModal">With endless love and gratitude,<br>Your forever grateful child 💕</div>
        <button class="close-letter-btn" id="closeModalBtn">✧ Close Letter ✧</button>
    </div>
</div>

<script>
    (function() {
        // Extended Khmer text with beautiful lines including the requested phrase "ហើយ QR Code កូននៅដដែលម៉ាក់"
        const fullKhmerText = `រីករាយថ្ងៃបុណ្យអ្នកម្ដាយ ❤️

អរគុណម៉ាក់ដែលតែងតែស្រឡាញ់ ថែរក្សា 
និងលះបង់គ្រប់យ៉ាងសម្រាប់ខ្ញុំ។

ខ្ញុំស្រឡាញ់ម៉ាក់ខ្លាំងណាស់ 💕

ហើយ QR Code កូននៅដដែលម៉ាក់ 💖
កូនស្រឡាញ់ម៉ាក់ខ្លាំងណាស់​អរគុណច្រើនម៉ា់ក់✨`;

        // Additional small note to display after typing completes (just to emphasize)
        const extraNote = "🌸 កុំភ្លេចស្គេន Qr code កូនផងម៉ាក់​ 🌸";
        
        const envelope = document.getElementById('realEnvelope');
        const letterModal = document.getElementById('letterModal');
        const khmerModalDiv = document.getElementById('khmerMessageModal');
        const closeModalBtn = document.getElementById('closeModalBtn');
        const extraContainer = document.getElementById('extraMessageContainer');
        
        let isOpened = false;
        let typingTimer = null;
        let currentTypingAnimation = null;

        // Spectacular sparkle effect
        function burstSparkles() {
            const sparkContainer = document.createElement('div');
            sparkContainer.className = 'sparkle-burst';
            document.body.appendChild(sparkContainer);
            const rect = envelope.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            const sparkCount = 60;
            for (let i = 0; i < sparkCount; i++) {
                const star = document.createElement('div');
                const size = Math.random() * 9 + 3;
                star.style.position = 'absolute';
                star.style.width = `${size}px`;
                star.style.height = `${size}px`;
                star.style.background = `radial-gradient(circle, #FFE8BE, #FFD89A)`;
                star.style.borderRadius = '50%';
                star.style.left = `${centerX + (Math.random() - 0.5) * 170}px`;
                star.style.top = `${centerY + (Math.random() - 0.5) * 140}px`;
                star.style.boxShadow = '0 0 18px #ffd89a';
                star.style.pointerEvents = 'none';
                star.style.opacity = '0.9';
                star.style.filter = 'blur(0.5px)';
                star.style.transition = 'transform 0.8s ease-out, opacity 0.7s';
                sparkContainer.appendChild(star);
                const angle = Math.random() * Math.PI * 2;
                const distance = 60 + Math.random() * 90;
                const dx = Math.cos(angle) * distance;
                const dy = Math.sin(angle) * distance - 25;
                setTimeout(() => {
                    star.style.transform = `translate(${dx}px, ${dy}px) scale(0)`;
                    star.style.opacity = '0';
                }, 5);
                setTimeout(() => star.remove(), 900);
            }
            setTimeout(() => sparkContainer.remove(), 1100);
        }

        // Typing effect with full text (contains QR phrase)
        function typeKhmerInModal() {
            if (currentTypingAnimation) clearTimeout(currentTypingAnimation);
            khmerModalDiv.innerHTML = '';
            extraContainer.innerHTML = ''; // clear extra first
            let idx = 0;
            function addChar() {
                if (idx < fullKhmerText.length) {
                    khmerModalDiv.innerHTML += fullKhmerText.charAt(idx);
                    idx++;
                    currentTypingAnimation = setTimeout(addChar, 32);
                } else {
                    // after full text typing, show extra note with gentle animation
                    const extraSpan = document.createElement('div');
                    extraSpan.className = 'extra-message';
                    extraSpan.innerHTML = `🌷 ${extraNote} 🌷`;
                    extraContainer.appendChild(extraSpan);
                    extraSpan.style.opacity = '0';
                    extraSpan.style.transform = 'scale(0.95)';
                    setTimeout(() => {
                        extraSpan.style.transition = 'all 0.4s ease';
                        extraSpan.style.opacity = '1';
                        extraSpan.style.transform = 'scale(1)';
                    }, 50);
                    currentTypingAnimation = null;
                }
            }
            addChar();
        }

        function openLetterModal() {
            letterModal.classList.add('active');
            typeKhmerInModal();
        }

        function openEnvelopeAndShowLetter() {
            if (isOpened) return;
            isOpened = true;
            envelope.classList.add('open');
            burstSparkles();
            setTimeout(() => burstSparkles(), 200);
            setTimeout(() => {
                openLetterModal();
            }, 550);
        }

        envelope.addEventListener('click', (e) => {
            e.stopPropagation();
            if (!isOpened) openEnvelopeAndShowLetter();
        });
        
        const flap = document.querySelector('.env-flap');
        if (flap) {
            flap.addEventListener('click', (e) => {
                e.stopPropagation();
                if (!isOpened) openEnvelopeAndShowLetter();
            });
        }
        
        closeModalBtn.addEventListener('click', () => {
            letterModal.classList.remove('active');
            if (currentTypingAnimation) clearTimeout(currentTypingAnimation);
        });
        
        letterModal.addEventListener('click', (e) => {
            if (e.target === letterModal) {
                letterModal.classList.remove('active');
                if (currentTypingAnimation) clearTimeout(currentTypingAnimation);
            }
        });

        // ---------- FLOATING HEARTS & PETALS CANVAS ----------
        const canvas = document.getElementById('floatingCanvas');
        let ctx = canvas.getContext('2d');
        let w, h;
        let particles = [];
        let animationId = null;

        class ParticleItem {
            constructor(type) {
                this.type = type;
                this.x = Math.random() * w;
                this.y = Math.random() * h;
                this.size = Math.random() * 12 + 5;
                this.speedY = Math.random() * 0.35 + 0.15;
                this.speedX = (Math.random() - 0.5) * 0.25;
                this.angle = Math.random() * Math.PI * 2;
                this.rotSpeed = (Math.random() - 0.5) * 0.015;
                this.opacity = Math.random() * 0.45 + 0.2;
                if (type === 'heart') {
                    this.color = `rgba(255, 160, 145, ${this.opacity + 0.15})`;
                } else {
                    this.color = `rgba(255, 210, 175, ${this.opacity + 0.1})`;
                }
            }
            update() {
                this.y -= this.speedY;
                this.x += this.speedX;
                this.angle += this.rotSpeed;
                if (this.y < -50) this.y = h + 60;
                if (this.x > w + 70) this.x = -70;
                if (this.x < -70) this.x = w + 70;
            }
            draw(ctx) {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);
                ctx.globalAlpha = this.opacity;
                if (this.type === 'heart') {
                    ctx.font = `${this.size}px "Segoe UI", "Arial", "Noto Color Emoji"`;
                    ctx.fillStyle = this.color;
                    ctx.fillText('❤️', 0, 0);
                } else {
                    ctx.beginPath();
                    ctx.ellipse(0, 0, this.size * 0.5, this.size * 0.28, 0, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255, 205, 170, ${this.opacity + 0.15})`;
                    ctx.fill();
                    ctx.beginPath();
                    ctx.ellipse(1.5, -1.5, this.size * 0.25, this.size * 0.14, 0, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255, 225, 195, 0.7)`;
                    ctx.fill();
                }
                ctx.restore();
            }
        }

        function initParticles() {
            particles = [];
            const totalCount = 40;
            for (let i = 0; i < totalCount; i++) {
                const kind = Math.random() > 0.55 ? 'heart' : 'petal';
                particles.push(new ParticleItem(kind));
            }
        }

        function resizeAndReset() {
            w = window.innerWidth;
            h = window.innerHeight;
            canvas.width = w;
            canvas.height = h;
            initParticles();
        }

        function animateParticles() {
            if (!ctx) return;
            ctx.clearRect(0, 0, w, h);
            for (let p of particles) {
                p.update();
                p.draw(ctx);
            }
            animationId = requestAnimationFrame(animateParticles);
        }

        window.addEventListener('resize', () => { resizeAndReset(); });
        resizeAndReset();
        animateParticles();

        window.addEventListener('beforeunload', () => {
            if (animationId) cancelAnimationFrame(animationId);
        });

        // Bokeh elements
        const bokehContainer = document.getElementById('bokehContainer');
        const bokehCount = Math.min(35, Math.floor(window.innerWidth / 30));
        for (let i = 0; i < bokehCount; i++) {
            const bokehDiv = document.createElement('div');
            bokehDiv.classList.add('bokeh');
            const sz = Math.random() * 150 + 50;
            bokehDiv.style.width = `${sz}px`;
            bokehDiv.style.height = `${sz}px`;
            bokehDiv.style.left = `${Math.random() * 100}%`;
            bokehDiv.style.top = `${Math.random() * 100}%`;
            bokehDiv.style.animationDuration = `${Math.random() * 12 + 10}s`;
            bokehDiv.style.animationDelay = `${Math.random() * 6}s`;
            bokehDiv.style.opacity = Math.random() * 0.4 + 0.1;
            bokehContainer.appendChild(bokehDiv);
        }

        // Additional styling
        const stylePremium = document.createElement('style');
        stylePremium.textContent = `
            .letter-card-4k {
                background: linear-gradient(115deg, #fffdf7, #fff9ef);
                box-shadow: 0 40px 65px rgba(40,25,15,0.3), inset 0 1px 0 rgba(255,245,225,0.8);
            }
            .khmer-message-4k {
                text-shadow: 0 1px 1px rgba(255,240,210,0.3);
                white-space: pre-line;
            }
            .letter-modal.active {
                backdrop-filter: blur(12px);
            }
            .env-flap {
                transition: transform 0.6s cubic-bezier(0.2, 0.95, 0.3, 1.1);
            }
            .qr-picture img {
                transition: all 0.2s;
            }
        `;
        document.head.appendChild(stylePremium);
        
        // Note: QR Code image placeholder: replace 'src' attribute of #qrCodeImg with your own QR picture URL later.
        // Instruction is clear: user can change later.
    })();
</script>
