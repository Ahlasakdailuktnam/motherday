<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />
    <title>Mother's Day | 4K Cinematic Letter Experience</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        background: radial-gradient(ellipse at 30% 20%, #fff5ed, #ffe3d4);
        font-family:
          "Cormorant Garamond", "Noto Sans Khmer", "Khmer OS", "Moul", serif;
        overflow-x: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
      }

      /* Animated bokeh lights */
      .bokeh-layer {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 0;
        overflow: hidden;
      }
      .bokeh {
        position: absolute;
        background: radial-gradient(
          circle,
          rgba(255, 220, 180, 0.5) 0%,
          rgba(255, 190, 140, 0) 80%
        );
        border-radius: 50%;
        filter: blur(35px);
        animation: floatBokeh 16s infinite alternate ease-in-out;
      }
      @keyframes floatBokeh {
        0% {
          transform: translateY(0px) translateX(0px) scale(1);
          opacity: 0.3;
        }
        100% {
          transform: translateY(-60px) translateX(40px) scale(1.25);
          opacity: 0.65;
        }
      }

      /* Floating hearts & petals canvas */
      #floatingCanvas {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 1;
      }

      /* Main container */
      .main-container {
        position: relative;
        z-index: 20;
        width: 100%;
        max-width: 1300px;
        margin: 1rem;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 90vh;
      }

      /* Glowing header */
      .hero-title {
        text-align: center;
        margin-bottom: 2rem;
        animation: softPulse 3s infinite alternate;
      }
      .hero-title h1 {
        font-size: clamp(2.2rem, 8vw, 5rem);
        font-weight: 500;
        background: linear-gradient(135deg, #e8aa95, #d9896e);
        background-clip: text;
        -webkit-background-clip: text;
        color: transparent;
        text-shadow: 0 5px 25px rgba(226, 140, 100, 0.3);
        letter-spacing: 2px;
        font-family: "Cormorant Garamond", serif;
      }
      @keyframes softPulse {
        0% {
          text-shadow:
            0 0 2px #ffd5c0,
            0 0 8px rgba(255, 200, 170, 0.2);
        }
        100% {
          text-shadow:
            0 0 20px #ffcfb0,
            0 0 30px rgba(245, 170, 130, 0.5);
        }
      }

      /* ========== 4K REALISTIC ENVELOPE ========== */
      .envelope-stage {
        perspective: 1600px;
        margin: 25px auto;
        cursor: pointer;
      }
      .envelope {
        position: relative;
        width: 420px;
        height: 270px;
        transform-style: preserve-3d;
        transition:
          transform 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.2),
          filter 0.3s;
        animation: elegantFloat 3.5s infinite ease-in-out;
      }
      @keyframes elegantFloat {
        0% {
          transform: translateY(0px);
          filter: drop-shadow(0 15px 18px rgba(0, 0, 0, 0.1));
        }
        50% {
          transform: translateY(-8px);
          filter: drop-shadow(0 28px 28px rgba(180, 100, 70, 0.2));
        }
        100% {
          transform: translateY(0px);
          filter: drop-shadow(0 15px 18px rgba(0, 0, 0, 0.1));
        }
      }
      .envelope:hover {
        transform: scale(1.02) translateY(-4px);
        filter: drop-shadow(0 30px 30px rgba(160, 80, 50, 0.25));
      }

      .env-base {
        position: absolute;
        width: 100%;
        height: 100%;
        background: linear-gradient(145deg, #f9e9dd, #fde4d2);
        border-radius: 20px;
        box-shadow:
          inset 0 1px 6px rgba(255, 252, 240, 0.9),
          inset 0 -3px 4px rgba(0, 0, 0, 0.02),
          0 20px 30px -8px rgba(0, 0, 0, 0.2);
        z-index: 1;
        border: 1px solid rgba(230, 190, 155, 0.7);
      }
      .env-base::before {
        content: "❤️";
        position: absolute;
        bottom: 18px;
        right: 25px;
        font-size: 24px;
        opacity: 0.35;
        color: #c98564;
        text-shadow: 0 1px 1px rgba(255, 255, 200, 0.6);
        pointer-events: none;
      }

      .env-flap {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 62%;
        background: linear-gradient(125deg, #fff5ec, #ffefe2);
        clip-path: polygon(0% 0%, 100% 0%, 50% 72%);
        z-index: 3;
        border-radius: 20px 20px 0 0;
        transform-origin: top;
        transition: transform 0.7s cubic-bezier(0.23, 1, 0.32, 1);
        box-shadow:
          inset 0 1px 6px rgba(255, 245, 230, 0.9),
          0 4px 8px rgba(0, 0, 0, 0.02);
        cursor: pointer;
        backface-visibility: hidden;
      }
      .env-base::after {
        content: "";
        position: absolute;
        bottom: 15px;
        left: 25px;
        right: 25px;
        height: 35px;
        background: radial-gradient(
          ellipse,
          rgba(0, 0, 0, 0.08) 0%,
          transparent 70%
        );
        border-radius: 50%;
        pointer-events: none;
      }

      .envelope.open .env-flap {
        transform: rotateX(180deg);
      }

      /* ========== 4K LETTER MODAL - CENTERED, BEAUTIFUL ========== */
      .letter-modal {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.6);
        backdrop-filter: blur(12px);
        z-index: 1000;
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
        visibility: hidden;
        transition: all 0.5s cubic-bezier(0.2, 0.9, 0.4, 1.2);
      }
      .letter-modal.active {
        opacity: 1;
        visibility: visible;
      }

      /* The 4K Letter Card */
      .letter-card-4k {
        background: #fffef7;
        width: 90%;
        max-width: 620px;
        max-height: 85vh;
        border-radius: 28px;
        padding: 2.2rem 2rem;
        box-shadow:
          0 40px 70px rgba(0, 0, 0, 0.3),
          0 0 0 1px rgba(230, 200, 170, 0.5),
          inset 0 1px 0 rgba(255, 255, 245, 0.9);
        transform: scale(0.9) translateY(30px);
        transition: transform 0.5s cubic-bezier(0.2, 0.9, 0.4, 1.2);
        overflow-y: auto;
        position: relative;
        font-family: "Cormorant Garamond", "Noto Sans Khmer", serif;
        backdrop-filter: blur(2px);
      }
      .letter-modal.active .letter-card-4k {
        transform: scale(1) translateY(0);
      }

      /* Premium paper texture */
      .letter-card-4k::before {
        content: "";
        position: absolute;
        top: 20px;
        left: 30px;
        right: 30px;
        height: 60px;
        background: repeating-linear-gradient(
          45deg,
          rgba(200, 170, 130, 0.06) 0px,
          rgba(200, 170, 130, 0.06) 3px,
          transparent 3px,
          transparent 12px
        );
        border-radius: 12px;
        pointer-events: none;
      }

      .letter-card-4k::-webkit-scrollbar {
        width: 5px;
      }
      .letter-card-4k::-webkit-scrollbar-track {
        background: #f0e0d4;
        border-radius: 10px;
      }
      .letter-card-4k::-webkit-scrollbar-thumb {
        background: #cfa98a;
        border-radius: 10px;
      }

      /* Wax seal decoration */
      .wax-seal {
        position: absolute;
        top: -18px;
        left: 50%;
        transform: translateX(-50%);
        width: 55px;
        height: 55px;
        background: radial-gradient(circle, #d4452a, #a1321a);
        border-radius: 50%;
        box-shadow:
          0 5px 12px rgba(0, 0, 0, 0.2),
          inset 0 1px 2px rgba(255, 255, 200, 0.4);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 28px;
        font-family: "Segoe UI", sans-serif;
        z-index: 10;
      }
      .wax-seal::after {
        content: "❤️";
        font-size: 24px;
        color: #ffefcf;
        text-shadow: 0 1px 1px rgba(0, 0, 0, 0.2);
      }

      /* Letter header */
      .letter-header {
        text-align: center;
        margin-top: 10px;
        margin-bottom: 20px;
      }
      .letter-header .greeting {
        font-size: 2rem;
        font-weight: 500;
        color: #b47c62;
        letter-spacing: 2px;
        font-family: "Cormorant Garamond", serif;
      }
      .letter-header .divider {
        width: 80px;
        height: 2px;
        background: linear-gradient(
          90deg,
          transparent,
          #d4a58a,
          #d4a58a,
          transparent
        );
        margin: 12px auto;
      }

      /* Khmer message styling - elegant */
      .khmer-message-4k {
        font-size: 1.3rem;
        line-height: 1.85;
        text-align: center;
        white-space: pre-line;
        font-family: "Noto Sans Khmer", "Khmer OS", "Cormorant Garamond", serif;
        color: #4a2c22;
        background: rgba(250, 240, 230, 0.4);
        padding: 20px 16px;
        border-radius: 24px;
        margin: 15px 0;
        letter-spacing: 0.3px;
        font-weight: 500;
      }

      .english-translation-4k {
        font-size: 0.9rem;
        font-style: italic;
        color: #b48a72;
        text-align: center;
        margin: 10px 0 20px;
        letter-spacing: 0.5px;
      }

      .signature-4k {
        text-align: center;
        margin-top: 25px;
        padding-top: 18px;
        border-top: 1px solid #efd5c2;
        font-size: 1.1rem;
        font-style: italic;
        color: #b27b62;
      }

      .close-letter-btn {
        display: block;
        margin: 25px auto 0;
        background: rgba(210, 160, 130, 0.2);
        border: 1px solid #d4a58a;
        padding: 10px 28px;
        border-radius: 50px;
        font-size: 1rem;
        cursor: pointer;
        color: #9b6a50;
        font-family: "Cormorant Garamond", serif;
        font-weight: 600;
        transition: all 0.3s;
        backdrop-filter: blur(4px);
      }
      .close-letter-btn:hover {
        background: #d4a58a;
        color: white;
        transform: scale(1.02);
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
      }

      /* Sparkle effect */
      .sparkle-burst {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 1001;
      }

      /* Music player */
      .music-panel {
        position: fixed;
        bottom: 28px;
        right: 28px;
        background: rgba(255, 245, 235, 0.9);
        backdrop-filter: blur(16px);
        border-radius: 60px;
        padding: 8px 20px;
        display: flex;
        align-items: center;
        gap: 12px;
        z-index: 300;
        border: 1px solid rgba(255, 215, 185, 0.8);
        box-shadow: 0 12px 25px rgba(0, 0, 0, 0.08);
        font-family: system-ui, sans-serif;
      }
      .music-toggle {
        background: rgba(200, 150, 120, 0.25);
        border: none;
        font-size: 1rem;
        cursor: pointer;
        padding: 6px 16px;
        border-radius: 40px;
        font-weight: 500;
        color: #ac6f54;
        transition: all 0.2s;
        font-family: inherit;
      }
      .music-toggle:hover {
        background: #ffe0cf;
        transform: scale(1.02);
      }
      .upload-label {
        background: rgba(200, 150, 120, 0.2);
        padding: 6px 14px;
        border-radius: 40px;
        font-size: 0.8rem;
        cursor: pointer;
        color: #ac6f54;
        font-weight: 500;
        transition: 0.2s;
        display: flex;
        align-items: center;
        gap: 5px;
      }
      .upload-label:hover {
        background: #ffe0cf;
      }
      #songUpload {
        display: none;
      }
      .now-playing {
        font-size: 0.7rem;
        color: #ca8f72;
        max-width: 140px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      @media (max-width: 650px) {
        .envelope {
          width: 310px;
          height: 205px;
        }
        .letter-card-4k {
          padding: 1.5rem;
          width: 92%;
        }
        .khmer-message-4k {
          font-size: 1rem;
          padding: 12px;
        }
        .greeting {
          font-size: 1.5rem;
        }
        .wax-seal {
          width: 45px;
          height: 45px;
          font-size: 22px;
          top: -15px;
        }
      }

      /* typing animation class */
      .typing-cursor {
        display: inline-block;
        width: 2px;
        background: #b47c62;
        margin-left: 2px;
        animation: blink 0.8s infinite;
      }
      @keyframes blink {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0;
        }
      }
    </style>
  </head>
  <body>
    <div class="bokeh-layer" id="bokehContainer"></div>
    <canvas id="floatingCanvas"></canvas>

    <div class="main-container">
      <div class="hero-title">
        <h1>Happy Mother’s Day 💖</h1>
      </div>
      <div class="envelope-stage">
        <div class="envelope" id="realEnvelope">
          <div class="env-base"></div>
          <div class="env-flap"></div>
        </div>
      </div>
      <div
        style="
          margin-top: 35px;
          font-size: 0.85rem;
          color: #c28b6e;
          text-align: center;
          background: rgba(255, 240, 230, 0.6);
          padding: 8px 20px;
          border-radius: 60px;
          backdrop-filter: blur(4px);
        "
      >
        ✨ click the envelope — a 4K letter will appear ✨
      </div>
    </div>

    <!-- 4K LETTER MODAL (centered, beautiful) -->
    <div class="letter-modal" id="letterModal">
      <div class="letter-card-4k">
        <div class="wax-seal"></div>
        <div class="letter-header">
          <div class="greeting">✧ To My Beloved Mother ✧</div>
          <div class="divider"></div>
        </div>
        <div class="khmer-message-4k" id="khmerMessageModal"></div>
        <div class="english-translation-4k" id="englishTranslation">
          "Happy Mother's Day ❤️ Thank you for always loving, caring, and
          sacrificing everything for me. I love you so much."
        </div>
        <div class="signature-4k" id="signatureModal">
          With endless love and gratitude,<br />Your forever grateful child 💕
        </div>
        <button class="close-letter-btn" id="closeModalBtn">
          ✧ Close Letter ✧
        </button>
      </div>
    </div>

    <!-- Music Widget -->
    <div class="music-panel">
      <button class="music-toggle" id="playPauseBtn">🎵 Play Music</button>
      <label class="upload-label" for="songUpload">📁 Upload Song</label>
      <input
        type="file"
        id="songUpload"
        accept="audio/mpeg, audio/wav, audio/ogg, audio/mp3"
      />
      <span class="now-playing" id="nowPlayingText">No song</span>
    </div>

    <script>
      (function () {
        // Beautiful Khmer message
        const fullKhmerText = `រីករាយថ្ងៃបុណ្យអ្នកម្ដាយ ❤️

អរគុណម៉ាក់ដែលតែងតែស្រឡាញ់ ថែរក្សា 
និងលះបង់គ្រប់យ៉ាងសម្រាប់ខ្ញុំ។

ខ្ញុំស្រឡាញ់ម៉ាក់ខ្លាំងណាស់ 💕`;

        const envelope = document.getElementById("realEnvelope");
        const letterModal = document.getElementById("letterModal");
        const khmerModalDiv = document.getElementById("khmerMessageModal");
        const closeModalBtn = document.getElementById("closeModalBtn");
        let isOpened = false;
        let typingInterval = null;

        // Spectacular sparkle effect function
        function burstSparkles() {
          const sparkContainer = document.createElement("div");
          sparkContainer.className = "sparkle-burst";
          document.body.appendChild(sparkContainer);
          const rect = envelope.getBoundingClientRect();
          const centerX = rect.left + rect.width / 2;
          const centerY = rect.top + rect.height / 2;
          const sparkCount = 85;
          for (let i = 0; i < sparkCount; i++) {
            const star = document.createElement("div");
            const size = Math.random() * 11 + 3;
            star.style.position = "absolute";
            star.style.width = `${size}px`;
            star.style.height = `${size}px`;
            star.style.background = `radial-gradient(circle, #FFE8BE, #FFD89A)`;
            star.style.borderRadius = "50%";
            star.style.left = `${centerX + (Math.random() - 0.5) * 190}px`;
            star.style.top = `${centerY + (Math.random() - 0.5) * 160}px`;
            star.style.boxShadow = "0 0 22px #ffd89a";
            star.style.pointerEvents = "none";
            star.style.opacity = "0.95";
            star.style.filter = "blur(0.5px)";
            star.style.transition = "transform 0.9s ease-out, opacity 0.8s";
            sparkContainer.appendChild(star);
            const angle = Math.random() * Math.PI * 2;
            const distance = 70 + Math.random() * 100;
            const dx = Math.cos(angle) * distance;
            const dy = Math.sin(angle) * distance - 30;
            setTimeout(() => {
              star.style.transform = `translate(${dx}px, ${dy}px) scale(0)`;
              star.style.opacity = "0";
            }, 5);
            setTimeout(() => star.remove(), 1000);
          }
          setTimeout(() => sparkContainer.remove(), 1200);
        }

        // Typing effect for Khmer text inside modal
        function typeKhmerInModal() {
          if (typingInterval) clearInterval(typingInterval);
          khmerModalDiv.innerHTML = "";
          let idx = 0;
          function addChar() {
            if (idx < fullKhmerText.length) {
              khmerModalDiv.innerHTML += fullKhmerText.charAt(idx);
              idx++;
              setTimeout(addChar, 28);
            }
          }
          addChar();
        }

        // Open modal + show 4K letter
        function openLetterModal() {
          letterModal.classList.add("active");
          typeKhmerInModal();
          // Add floating animation extra
        }

        // Envelope click sequence: open envelope, sparkles, then show modal
        function openEnvelopeAndShowLetter() {
          if (isOpened) return;
          isOpened = true;
          envelope.classList.add("open");

          // Sparkle effects for celebration
          burstSparkles();
          setTimeout(() => burstSparkles(), 200);
          setTimeout(() => burstSparkles(), 450);

          // After envelope flap opens, show the modal with letter
          setTimeout(() => {
            openLetterModal();
          }, 550);
        }

        envelope.addEventListener("click", (e) => {
          e.stopPropagation();
          if (!isOpened) openEnvelopeAndShowLetter();
        });

        const flap = document.querySelector(".env-flap");
        if (flap) {
          flap.addEventListener("click", (e) => {
            e.stopPropagation();
            if (!isOpened) openEnvelopeAndShowLetter();
          });
        }

        // Close modal
        closeModalBtn.addEventListener("click", () => {
          letterModal.classList.remove("active");
        });

        // Close modal when clicking outside the card
        letterModal.addEventListener("click", (e) => {
          if (e.target === letterModal) {
            letterModal.classList.remove("active");
          }
        });

        // ---------- MUSIC SYSTEM ----------
        let audioElement = null;
        let isMusicPlaying = false;
        const playPauseBtn = document.getElementById("playPauseBtn");
        const songUpload = document.getElementById("songUpload");
        const nowPlayingSpan = document.getElementById("nowPlayingText");

        function initAudio() {
          if (!audioElement) {
            audioElement = new Audio();
            audioElement.loop = true;
            audioElement.volume = 0.3;
          }
        }

        songUpload.addEventListener("change", (event) => {
          const file = event.target.files[0];
          if (file && file.type.startsWith("audio/")) {
            initAudio();
            const url = URL.createObjectURL(file);
            audioElement.src = url;
            audioElement.load();
            nowPlayingSpan.innerText =
              file.name.length > 25
                ? file.name.slice(0, 22) + "..."
                : file.name;
            if (isMusicPlaying) {
              audioElement.play().catch((e) => console.log("play error", e));
            }
            playPauseBtn.innerHTML = "⏸ Pause";
            isMusicPlaying = true;
          } else if (file) {
            nowPlayingSpan.innerText = "Invalid format";
          }
        });

        playPauseBtn.addEventListener("click", () => {
          initAudio();
          if (!audioElement.src) {
            nowPlayingSpan.innerText = "Upload a song first";
            setTimeout(() => {
              if (nowPlayingSpan.innerText === "Upload a song first")
                nowPlayingSpan.innerText = "No song";
            }, 1800);
            return;
          }
          if (isMusicPlaying) {
            audioElement.pause();
            playPauseBtn.innerHTML = "🎵 Play Music";
            isMusicPlaying = false;
          } else {
            audioElement.play().catch((err) => {
              console.warn(err);
              nowPlayingSpan.innerText = "Error playing";
            });
            playPauseBtn.innerHTML = "⏸ Pause";
            isMusicPlaying = true;
          }
        });

        // 3. FLOATING HEARTS & PETALS (cinematic)
        const canvas = document.getElementById("floatingCanvas");
        let ctx = canvas.getContext("2d");
        let w, h;
        let particles = [];

        class ParticleItem {
          constructor(type) {
            this.type = type;
            this.x = Math.random() * w;
            this.y = Math.random() * h;
            this.size = Math.random() * 14 + 6;
            this.speedY = Math.random() * 0.45 + 0.2;
            this.speedX = (Math.random() - 0.5) * 0.3;
            this.angle = Math.random() * Math.PI * 2;
            this.rotSpeed = (Math.random() - 0.5) * 0.02;
            this.opacity = Math.random() * 0.5 + 0.25;
            if (type === "heart") {
              this.color = `rgba(255, 160, 145, ${this.opacity + 0.2})`;
            } else {
              this.color = `rgba(255, 210, 175, ${this.opacity + 0.15})`;
            }
          }
          update() {
            this.y -= this.speedY;
            this.x += this.speedX;
            this.angle += this.rotSpeed;
            if (this.y < -60) this.y = h + 70;
            if (this.x > w + 80) this.x = -80;
            if (this.x < -80) this.x = w + 80;
          }
          draw(ctx) {
            ctx.save();
            ctx.translate(this.x, this.y);
            ctx.rotate(this.angle);
            ctx.globalAlpha = this.opacity;
            if (this.type === "heart") {
              ctx.font = `${this.size}px "Segoe UI", "Arial", "Noto Color Emoji"`;
              ctx.fillStyle = this.color;
              ctx.fillText("❤️", 0, 0);
            } else {
              ctx.beginPath();
              ctx.ellipse(
                0,
                0,
                this.size * 0.55,
                this.size * 0.32,
                0,
                0,
                Math.PI * 2,
              );
              ctx.fillStyle = `rgba(255, 205, 170, ${this.opacity + 0.2})`;
              ctx.fill();
              ctx.beginPath();
              ctx.ellipse(
                2,
                -2,
                this.size * 0.3,
                this.size * 0.18,
                0,
                0,
                Math.PI * 2,
              );
              ctx.fillStyle = `rgba(255, 225, 195, 0.7)`;
              ctx.fill();
            }
            ctx.restore();
          }
        }

        function initParticles() {
          particles = [];
          const totalCount = 55;
          for (let i = 0; i < totalCount; i++) {
            const kind = Math.random() > 0.55 ? "heart" : "petal";
            particles.push(new ParticleItem(kind));
          }
        }

        function resizeAndReset() {
          w = window.innerWidth;
          h = window.innerHeight;
          canvas.width = w;
          canvas.height = h;
          initParticles();
        }

        function animateParticles() {
          if (!ctx) return;
          ctx.clearRect(0, 0, w, h);
          for (let p of particles) {
            p.update();
            p.draw(ctx);
          }
          requestAnimationFrame(animateParticles);
        }

        window.addEventListener("resize", () => {
          resizeAndReset();
        });
        resizeAndReset();
        animateParticles();

        // Bokeh generation
        const bokehContainer = document.getElementById("bokehContainer");
        for (let i = 0; i < 55; i++) {
          const bokehDiv = document.createElement("div");
          bokehDiv.classList.add("bokeh");
          const sz = Math.random() * 200 + 60;
          bokehDiv.style.width = `${sz}px`;
          bokehDiv.style.height = `${sz}px`;
          bokehDiv.style.left = `${Math.random() * 100}%`;
          bokehDiv.style.top = `${Math.random() * 100}%`;
          bokehDiv.style.animationDuration = `${Math.random() * 14 + 10}s`;
          bokehDiv.style.animationDelay = `${Math.random() * 7}s`;
          bokehDiv.style.opacity = Math.random() * 0.45 + 0.15;
          bokehContainer.appendChild(bokehDiv);
        }

        // Additional premium styling for modal
        const stylePremium = document.createElement("style");
        stylePremium.textContent = `
            .letter-card-4k {
                background: linear-gradient(115deg, #fffdf7, #fff9ef);
                box-shadow: 0 40px 70px rgba(40,25,15,0.35), inset 0 1px 0 rgba(255,245,225,0.8);
            }
            .khmer-message-4k {
                text-shadow: 0 1px 1px rgba(255,240,210,0.4);
                letter-spacing: 0.3px;
            }
            .envelope.open {
                transition: transform 0.3s;
            }
            .letter-modal.active {
                backdrop-filter: blur(14px);
            }
        `;
        document.head.appendChild(stylePremium);
      })();
    </script>
  </body>
</html>
